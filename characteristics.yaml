  name_de: Modus-Konflikt
  platform: binary_sensor
  category: diagnostic
  device_class: problem

- match: {managementPointType: climateControl, characteristic: isHolidayModeActive}
  topic: holiday_mode
  name: Holiday mode
  name_de: Urlaubsmodus
  platform: binary_sensor
  category: diagnostic

# --- outdoorUnit ---
- match: {managementPointType: outdoorUnit, characteristic: errorCode}
  topic: outdoor_error_code
  name: Outdoor unit error code
  name_de: Außengerät-Fehlercode
  platform: sensor
  category: diagnostic

- match: {managementPointType: outdoorUnit, characteristic: isInErrorState}
  topic: outdoor_error_state
  name: Outdoor unit error
  name_de: Außengerät-Fehler
  platform: binary_sensor
  category: diagnostic
  device_class: problem

- match: {managementPointType: outdoorUnit, characteristic: isInWarningState}
  topic: outdoor_warning_state
  name: Outdoor unit warning
  name_de: Außengerät-Warnung
  platform: binary_sensor
  category: diagnostic
