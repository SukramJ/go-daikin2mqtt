  name: Refrigerant temperature
  name_de: Kältemitteltemperatur
  platform: sensor
  device_class: temperature
  unit: "°C"
  state_class: measurement
  category: diagnostic
  precision: 1

# === Additional diagnostic characteristics (from a live device dump) =========
# Plain scalar / boolean values surfaced as diagnostic sensors. They appear on
# the matching sub-device (gateway / indoor unit / outdoor unit).

# Note: model info and software/firmware versions are carried in the HA `device`
# object (model / sw_version / serial_number, from deviceInfos), so they are NOT
# duplicated as separate sensors. SSID and time zone are intentionally not
# surfaced.

