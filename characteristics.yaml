# === Energy / consumption (climateControl electrical) ======================
# kind=energy sums the relevant period slice of consumptionData arrays:
# daily = today, weekly = this week, monthly = current month. total_increasing.
- match: {managementPointType: climateControl, characteristic: consumptionData}
  topic: cooling_energy_daily
  name: Cooling energy today
  name_de: Kühlenergie heute
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  kind: energy
  consumption: electrical
  energy_mode: cooling
  energy_period: daily
  precision: 3

- match: {managementPointType: climateControl, characteristic: consumptionData}
  topic: cooling_energy_weekly
  name: Cooling energy this week
  name_de: Kühlenergie diese Woche
