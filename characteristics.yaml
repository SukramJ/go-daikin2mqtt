# === Air purifier ==========================================================
- match: {managementPointType: climateControl, characteristic: airPurificationMode}
  topic: air_purification_mode
  name: Air purification mode
  name_de: Luftreinigungsmodus
  platform: select
  settable: true
  values:
    - {value: manualFan, label: Manual fan, label_de: Manueller Lüfter}
    - {value: autoFan, label: Auto fan, label_de: Automatischer Lüfter}
    - {value: econo, label: Econo, label_de: Eco}
    - {value: antiPollen, label: Anti-pollen, label_de: Anti-Pollen}
    - {value: circulator, label: Circulator, label_de: Umluft}

# Altherma hydro-unit model/version are carried in the HA `device` object
# (model / sw_version, from deviceInfos for indoorUnitHydro), not as sensors.

# --- Per-unit comfort/air settings ---
- match: {managementPointType: climateControl, characteristic: streamerMode}
  topic: streamer
  name: Streamer
  name_de: Streamer
  platform: switch
  settable: true
  values:
    - {value: "on", label: "On", label_de: "An"}
    - {value: "off", label: "Off", label_de: "Aus"}

# --- Outdoor-shared settings (one entity per outdoor unit; writes fan out) ---
# Eco mode limits the shared outdoor compressor, so on a multi-split it is a
# single outdoor-unit setting (like outdoor silent): one entity per outdoor unit,
# writes fan out, read state is the OR across the group. Powerful (per indoor
# unit) suspends it group-wide and the coordinator restores it afterwards
# (the hardware does not) — see reconcileEconoSuspend in coordinator/outdoor.go.
- match: {managementPointType: climateControl, characteristic: econoMode}
  topic: econo_mode
  name: Econo mode
  name_de: Eco-Modus
  platform: switch
  settable: true
  scope: outdoor
  values:
    - {value: "on", label: "On", label_de: "An"}
    - {value: "off", label: "Off", label_de: "Aus"}

- match: {managementPointType: climateControl, characteristic: outdoorSilentMode}
  topic: outdoor_silent
  name: Outdoor silent
  name_de: Außen Geräuscharm
  platform: switch
  settable: true
  scope: outdoor
  values:
    - {value: "on", label: "On", label_de: "An"}
    - {value: "off", label: "Off", label_de: "Aus"}

- match: {managementPointType: climateControl, characteristic: demandControl}
  topic: demand_control
  name: Demand limit
  name_de: Leistungsbegrenzung
  platform: number
  unit: "%"
  settable: true
  scope: outdoor
  # Local (Faikin) uses the plain "demand" int. The cloud nested path is
  # best-effort and should be verified against a live `points` dump.
  value_path: modes/fixed
  path: /demandControl/modes/fixed

# --- Local-only telemetry (Faikin/Faikout, no ONECTA cloud equivalent) -------
# These match a synthetic characteristic the cloud never reports, so they are
# only published when local mode synthesizes them (localOnlyTopics) and fed from
# the Faikin state document. Placement follows the physics, confirmed on a live
# multi-split:
#   * Per indoor unit (each unit reports its own value): energy totals, power,
#     fan speed, and refrigerant (liquid-line) temperature — live data shows
#     per-member values for all of them.
#   * Also aggregated as one SUM per outdoor unit (the system total): the
#     outdoor_* variants below (scope: outdoor).
#   * Shared outdoor values, identical on every indoor unit, shown ONCE per
#     outdoor unit: compressor frequency.

# Per indoor unit (own value).
- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: energy_total
  name: Energy total
  name_de: Energie gesamt
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: heating_energy_total
  name: Heating energy total
  name_de: Heizenergie gesamt
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: cooling_energy_total
  name: Cooling energy total
  name_de: Kühlenergie gesamt
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: power_consumption
  name: Power
  name_de: Leistung
  platform: sensor
  device_class: power
  unit: W
  state_class: measurement
  precision: 0

# Each indoor unit's own fan (S21 `RL` reports the responding unit's fan, live
# data shows different values per member) — NOT a shared outdoor value. The
# firmware publishes `fanfreq` as rpm/60 (Hz); the daemon converts back to rpm.
# No device_class: HA's `frequency` class does not accept rpm.
- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: fan_speed
  name: Fan speed
  name_de: Lüfterdrehzahl
  platform: sensor
  unit: rpm
  state_class: measurement
  category: diagnostic
  precision: 0

# Each indoor unit's own liquid-line (coil) temperature — live data shows
# per-member values (e.g. 20/18/14 °C at the same moment), not a shared reading.
- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: refrigerant_temperature
  name: Refrigerant temperature
  name_de: Kältemitteltemperatur
  platform: sensor
  device_class: temperature
  unit: "°C"
  state_class: measurement
  category: diagnostic
  precision: 1

# System total per outdoor unit (sum of the per-unit values above).
- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: outdoor_energy_total
  name: Energy total (system)
  name_de: Energie gesamt (Anlage)
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  scope: outdoor
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: outdoor_heating_energy_total
  name: Heating energy total (system)
  name_de: Heizenergie gesamt (Anlage)
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  scope: outdoor
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: outdoor_cooling_energy_total
  name: Cooling energy total (system)
  name_de: Kühlenergie gesamt (Anlage)
  platform: sensor
  device_class: energy
  unit: kWh
  state_class: total_increasing
  scope: outdoor
  precision: 3

- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: outdoor_power
  name: Power (system)
  name_de: Leistung (Anlage)
  platform: sensor
  device_class: power
  unit: W
  state_class: measurement
  scope: outdoor
  precision: 0

# Shared outdoor values, identical on every indoor unit → one entity per outdoor.
- match: {managementPointType: climateControl, characteristic: faikinLocal}
  topic: compressor_frequency
  name: Compressor frequency
  name_de: Verdichterfrequenz
  platform: sensor
  device_class: frequency
  unit: Hz
  state_class: measurement
  scope: outdoor
  category: diagnostic
  precision: 1

# === Additional diagnostic characteristics (from a live device dump) =========
# Plain scalar / boolean values surfaced as diagnostic sensors. They appear on
# the matching sub-device (gateway / indoor unit / outdoor unit).

# Note: model info and software/firmware versions are carried in the HA `device`
# object (model / sw_version / serial_number, from deviceInfos), so they are NOT
# duplicated as separate sensors. SSID and time zone are intentionally not
# surfaced.

