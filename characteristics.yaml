# go-daikin2mqtt — curated ONECTA characteristic catalog.
#
# This file maps Daikin ONECTA cloud data points (management-point
# characteristics) to MQTT topics and Home Assistant entities. It is the
# single source of truth for which characteristics are published and how
# they are exposed — only entries listed here are mapped (deterministic,
# curated coverage). The i18n model is English-canonical with optional German
# overrides applied per item (a missing German value never hides the English).
#
# Each entry has the shape:
#
#   - match:                       # which characteristic this entry matches
#       managementPointType: climateControl
#       characteristic: sensoryData
#     topic: room_temperature      # MQTT suffix, snake_case, unique
#     name: Room temperature       # English friendly name (canonical)
#     name_de: Raumtemperatur      # optional German name
#     platform: sensor             # sensor|binary_sensor|switch|select|number|climate|button
#     device_class: temperature
#     icon: mdi:thermometer        # optional HA icon override
#     unit: "°C"
#     state_class: measurement
#     settable: false
#     value_path: roomTemperature  # nested path into the characteristic value
#     values:                      # enum options for select / enum sensor
#       - {value: heating, label: Heating, label_de: Heizen}
#     path: operationModes/{mode}/setpoints/roomTemperature  # nested PATCH path
#     precision: 1
#     enabled: true                # optional, default true
#
# value_path / path support the "{mode}" token, replaced at runtime by the
# current operationMode (e.g. "cooling"). Unknown fields are ignored.
# Covers the climateControl management point plus read-only hardware info;
# domesticHotWater and energy will be added in later milestones.

# === climateControl ========================================================

# --- Power -----------------------------------------------------------------
- match: {managementPointType: climateControl, characteristic: onOffMode}
  topic: power
  name: Power
  name_de: Betrieb
  platform: switch
  settable: true
  values:
    - {value: "on", label: "On", label_de: "An"}
    - {value: "off", label: "Off", label_de: "Aus"}

- match: {managementPointType: climateControl, characteristic: powerfulMode}
  topic: powerful_mode
  name: Powerful mode
  name_de: Powerful-Modus
  platform: switch
  settable: true
  values:
    - {value: "on", label: "On", label_de: "An"}
    - {value: "off", label: "Off", label_de: "Aus"}

# --- Operation mode --------------------------------------------------------
- match: {managementPointType: climateControl, characteristic: operationMode}
  topic: operation_mode
  name: Operation mode
  name_de: Betriebsart
  platform: select
  settable: true
  values:
    - {value: heating, label: Heating, label_de: Heizen}
    - {value: cooling, label: Cooling, label_de: Kühlen}
    - {value: auto, label: Auto, label_de: Automatik}
    - {value: dry, label: Dry, label_de: Entfeuchten}
    - {value: fanOnly, label: Fan only, label_de: Nur Lüfter}

# --- Temperatures / humidity (read-only, nested in sensoryData) ------------
- match: {managementPointType: climateControl, characteristic: sensoryData}
  topic: room_temperature
  name: Room temperature
  name_de: Raumtemperatur
  platform: sensor
  device_class: temperature
  unit: "°C"
  state_class: measurement
  value_path: roomTemperature
  precision: 1

- match: {managementPointType: climateControl, characteristic: sensoryData}
  topic: outdoor_temperature
  name: Outdoor temperature
  name_de: Außentemperatur
  platform: sensor
  device_class: temperature
  unit: "°C"
  state_class: measurement
  value_path: outdoorTemperature
  # The outdoor temperature is the one outdoor unit's reading; surface it once
  # per outdoor unit rather than duplicated on every indoor unit.
  scope: outdoor
  precision: 1

- match: {managementPointType: climateControl, characteristic: sensoryData}
  topic: room_humidity
  name: Room humidity
  name_de: Raumfeuchte
  platform: sensor
  device_class: humidity
  unit: "%"
  state_class: measurement
  value_path: roomHumidity
  precision: 0

# --- Temperature setpoint (settable, scoped by active operation mode) ------
# min/max/step come from the live API (minValue/maxValue/stepValue) so the
# bounds always match the unit's reported capabilities.
- match: {managementPointType: climateControl, characteristic: temperatureControl}
  topic: temperature_setpoint
  name: Temperature setpoint
  name_de: Solltemperatur
  platform: number
  device_class: temperature
  unit: "°C"
  settable: true
  precision: 1
  value_path: operationModes/{mode}/setpoints/roomTemperature
  path: /operationModes/{mode}/setpoints/roomTemperature

# --- Diagnostics -----------------------------------------------------------
- match: {managementPointType: climateControl, characteristic: isInErrorState}
  topic: error_state
  name: Error
  name_de: Fehler
  platform: binary_sensor
  category: diagnostic
  device_class: problem

- match: {managementPointType: climateControl, characteristic: isInWarningState}
  topic: warning_state
  name: Warning
  name_de: Warnung
  platform: binary_sensor
  category: diagnostic
  device_class: problem

- match: {managementPointType: climateControl, characteristic: errorCode}
  topic: error_code
  name: Error code
  name_de: Fehlercode
  platform: sensor
  category: diagnostic

# === gateway (read-only hardware info) =====================================
# Gateway firmware version and MAC address are carried in the HA `device` object
# (sw_version / connections), not as separate sensors.

- match: {managementPointType: gateway, characteristic: ipAddress}
  topic: gateway_ip_address
  name: Gateway IP address
  name_de: Gateway-IP-Adresse
  platform: sensor
  category: diagnostic

- match: {managementPointType: gateway, characteristic: softwareVersion}
  topic: gateway_software_version
  name: Gateway software version
  name_de: Gateway-Softwareversion
  platform: sensor
  category: diagnostic

- match: {managementPointType: gateway, characteristic: isInErrorState}
  topic: gateway_error_state
  name: Gateway error
  name_de: Gateway-Fehler
  platform: binary_sensor
  category: diagnostic
  device_class: problem

# Indoor/outdoor unit model and serial number are carried in the HA `device`
# object (model / serial_number, from deviceInfos), not as separate sensors.

# === climateControl: Altherma air-to-water (leaving water) =================
# Altherma units control leaving-water temperature instead of room
# temperature. The entry coexists with temperature_setpoint: each device
# resolves only the setpoint its temperatureControl actually exposes.
- match: {managementPointType: climateControl, characteristic: temperatureControl}
  topic: leaving_water_setpoint
  name: Leaving water setpoint
  name_de: Vorlauf-Solltemperatur
  platform: number
  device_class: temperature
  unit: "°C"
  settable: true
  precision: 1
  value_path: operationModes/{mode}/setpoints/leavingWaterTemperature
  path: /operationModes/{mode}/setpoints/leavingWaterTemperature

- match: {managementPointType: climateControl, characteristic: temperatureControl}
  topic: leaving_water_offset
  name: Leaving water offset
  name_de: Vorlauf-Offset
  platform: number
  unit: "°C"
  settable: true
  precision: 1
  value_path: operationModes/{mode}/setpoints/leavingWaterOffset
  path: /operationModes/{mode}/setpoints/leavingWaterOffset

